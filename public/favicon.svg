<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="120" fill="#09090b" />
  
  <g transform="translate(100, 140)" fill="url(#gradient)" filter="url(#glow)">
    <!-- Main generic bracket symbol -->
    <path d="M 120 40 L 40 120 L 120 200 L 90 230 L -20 120 L 90 10 Z" />
    <path d="M 200 40 L 280 120 L 200 200 L 230 230 L 340 120 L 230 10 Z" />
    
    <!-- Forward Slash Component -->
    <rect x="140" y="-10" width="40" height="260" transform="rotate(25, 160, 120)" />
  </g>
</svg>